name: Publicar Sudoku en GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v6

      - name: Instalar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Construir Sudoku web
        run: |
          python -m pygbag --build --ume_block 0 --can_close 1 ./juego

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Subir archivos del juego
        uses: actions/upload-pages-artifact@v3
        with:
          path: juego/build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v5
